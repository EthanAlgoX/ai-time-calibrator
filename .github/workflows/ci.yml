name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile CLI
        run: python3 -m py_compile scripts/estimate.py

      - name: Run tests
        run: python3 -m unittest discover -s tests

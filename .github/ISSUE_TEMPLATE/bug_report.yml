name: Bug report
description: Report a CLI, documentation, or rule validation bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or input
      description: Paste the command, task description, or rule snippet that caused the issue.
    validations:
      required: false
